<!DOCTYPE html>
<html lang="en">
<head>

    <style>html,body{background:#0a0a0f!important;color-scheme:dark}</style>
    <meta name="color-scheme" content="dark">
    <!--dl-pt-boot-->
    <script>
    (function(){
        var s=document.createElement('style');
        s.textContent='html,body{background:#0a0a0f!important;margin:0}#dl-pt-boot{position:fixed;inset:0;z-index:99999;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif}#dl-pt-boot svg{animation:_ptpulse 1.6s ease-in-out infinite}#dl-pt-bt{width:140px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}#dl-pt-bb{height:100%;width:35%;background:linear-gradient(90deg,transparent,#00d4ff,transparent);border-radius:99px;animation:_ptslide 1.1s ease-in-out infinite}#dl-pt-bn{color:#fff;font-size:1.1rem;font-weight:700;letter-spacing:.07em}@keyframes _ptslide{0%{transform:translateX(-140px)}100%{transform:translateX(380px)}}@keyframes _ptpulse{0%,100%{filter:drop-shadow(0 0 7px rgba(0,212,255,.4))}50%{filter:drop-shadow(0 0 18px rgba(0,212,255,.75))}}';
        document.head.appendChild(s);
        var d=document.createElement('div');d.id='dl-pt-boot';
        d.innerHTML='<svg width="48" height="48" viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="13" fill="rgba(0,212,255,0.1)"/><path d="M26 10 L40 18 L40 34 L26 42 L12 34 L12 18 Z" fill="none" stroke="#00d4ff" stroke-width="2.4" stroke-linejoin="round"/><path d="M26 18 L33 22 L33 30 L26 34 L19 30 L19 22 Z" fill="rgba(0,212,255,0.13)" stroke="#00d4ff" stroke-width="1.4"/><circle cx="26" cy="26" r="2.8" fill="#00d4ff"/></svg><div id="dl-pt-bn">DarkLock</div><div id="dl-pt-bt"><div id="dl-pt-bb"></div></div>';
        document.documentElement.appendChild(d);
        window._DLBootHide=function(){var e=document.getElementById('dl-pt-boot');if(e){e.style.transition='opacity .3s ease';e.style.opacity='0';setTimeout(function(){e&&e.remove()},350);}};
        window.addEventListener('load',function(){setTimeout(window._DLBootHide,60)});
    })();
</script>
